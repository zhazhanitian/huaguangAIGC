version: '3.8'

services:
  mysql:
    image: mariadb:10.11
    container_name: huaguang-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: huaguang_aigc
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/scripts/huaguang_aigc-20260302-230054.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: huaguang-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: huaguang-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=root
      - DB_DATABASE=huaguang_aigc
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=huaguang-aigc-jwt-secret-2026
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mysql
      - redis
    volumes:
      - ./server/uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: huaguang-web
    restart: always
    ports:
      - "3002:80"
    depends_on:
      - server

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: huaguang-admin
    restart: always
    ports:
      - "3003:80"
    depends_on:
      - server

volumes:
  mysql_data:
  redis_data:
